user www-data;
worker_processes auto;
worker_rlimit_nofile 100000;
error_log /var/log/openresty/error.log info;


events {
	worker_connections 5000;
	use epoll;
	multi_accept on;
}

http {
	include /etc/openresty/conf.d/*.conf;
	keepalive_timeout 30;
	keepalive_requests 10000;
	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	client_body_timeout 30;
	client_header_timeout 30;
	send_timeout 30;
	include mime.types;
	access_log /var/log/openresty/access.log;
	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers on;
	gzip on;

	lua_shared_dict stats 20m;
	lua_shared_dict locks 1m;
	lua_package_path "/etc/openresty/lualib/?.lua;;";

	init_worker_by_lua_block {
		local ngx			= ngx
		local lock_lib = require "resty.lock"
		local interval = 300

		local function get_initial_delay(interval)
			local now = ngx.now()
			local sec = now % 60
			local min5 = math.floor(now / 60) % 5
			local next = 5 - min5
			local delay = (next * 60) - sec
			if delay < 0 then delay = delay + interval end
			return delay
		end

		local function do_export(premature)
			if premature then return end
			if ngx.worker.id() ~= 0 then return end

			local locker = lock_lib:new("locks")
			if not locker then return end

			local elapsed = locker:lock("export_lock")
			if not elapsed then return end

			local stats = ngx.shared.stats
			local keys = stats:get_keys(0)


			local found = false
			for _, k in ipairs(keys) do
				if k:match("^(.-):(.-):requests$") then
					if stats:get(k) > 0 then
						found = true
						break
					end
				end
			end

			if not found then
				locker:unlock()
				return
			end

			local now_str = os.date("%Y-%m-%d_%H-%M", ngx.time())
			local fp = "/home/ubuntu/CDN/data/log/bw_" .. now_str .. ".csv"
			local f = io.open(fp, "w")
			if not f then
				locker:unlock()
				return
			end

			f:write("Time,App,Stream,Requests,Unique Users,Data Sent (bytes)\n")


			for _, k in ipairs(keys) do
				local app, stream = k:match("^(.-):(.-):requests$")
				if app then
					local base = app .. ":" .. stream
					local req = stats:get(base..":requests") or 0

					if req > 0 then
						local uniq	= stats:get(base..":unique") or 0
						local bytes = stats:get(base..":bytes")	or 0
						f:write(string.format("%s,%s,%s,%d,%d,%d\n",
							os.date("%m/%d/%Y %H:%M"), app, stream, req, uniq, bytes))
					end

					stats:delete(base..":requests")
					stats:delete(base..":unique")
					stats:delete(base..":bytes")

					for _, ipk in ipairs(stats:get_keys(0)) do
						if ipk:find("^"..base..":ip:") then
							stats:delete(ipk)
						end
					end
				end
			end

			f:close()
			locker:unlock()
		end

		if ngx.worker.id() == 0 then
			local delay = get_initial_delay(interval)
			local ok = ngx.timer.at(delay, function(premature)
				if not premature then
					do_export()
					local ok2 = ngx.timer.every(interval, do_export)
				end
			end)
		end
	}
}
