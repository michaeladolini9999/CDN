<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HLS Auto Player with Sound</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
    #playButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid white;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <video id="video" controls playsinline></video>
  <div id="playButton">Click to Play with Sound</div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById('video');
    const playBtn = document.getElementById('playButton');

    const url = decodeURIComponent(window.location.search.slice(1));
    function initHLS() {
      if (Hls.isSupported()) {
        const hls = new Hls({
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 5,
          maxBufferLength: 10,
          maxBufferSize: 0,
          lowLatencyMode: false,
        });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          tryAutoplay();
        });
        hls.on(Hls.Events.ERROR, (event, data) => {
          console.warn("HLS.js error:", data);
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        tryAutoplay();
      } else {
        document.body.innerHTML = '<p style="color:white;text-align:center;margin-top:20%">Your browser does not support HLS playback.</p>';
      }
    }

    function tryAutoplay() {
      video.play().catch(() => {
        playBtn.style.display = 'block';
      });
    }

    playBtn.addEventListener('click', () => {
      video.muted = false;
      video.play().then(() => {
        playBtn.style.display = 'none';
      }).catch(err => console.error("Cannot autoplay:", err));
    });

    video.muted = false;

    initHLS();
  </script>
</body>
</html>
